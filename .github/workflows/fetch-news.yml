name: Fetch Daily AI News

on:
  schedule:
    # Run daily at 6:00 AM UTC (2:00 PM Beijing Time)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch news from RSS feeds
        run: node day/scripts/fetch-news.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add day/data/news.json day/data/news-history.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📰 Update daily AI news $(date -u +%Y-%m-%d)"
            git push
          fi
